services:
  - type: web
    name: bookforge-guia-drcm
    runtime: static
    branch: main
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self'; img-src 'self' data:; object-src 'self'; frame-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
